# Rectangle API service on Railway
# Recommended Railway service root directory: apps/api

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Migrations are idempotent through schema_migrations and run before server start.
startCommand = "npm run migrate && npm run start"
# Railway deployment health checks should prove the process is alive. The stricter
# DB readiness endpoint remains available at /health/ready for manual/monitoring checks.
healthcheckPath = "/health/live"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
