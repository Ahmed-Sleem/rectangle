# Rectangle API service on Railway
# Recommended Railway service root directory: apps/api

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run migrations inside the long-running container startup. This avoids Railway
# predeploy environment differences for Docker services while keeping migrations
# idempotent through schema_migrations.
startCommand = "npm run migrate && npm run start"
healthcheckPath = "/health/ready"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
