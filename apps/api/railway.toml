# Rectangle API service on Railway
# Recommended Railway service root directory: apps/api

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway runs this before the app starts. It is better than chaining migrations
# into the long-running start command because migration failures are clearer.
preDeployCommand = "npm run migrate"
startCommand = "npm run start"
healthcheckPath = "/health/ready"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
