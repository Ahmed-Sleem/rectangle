name: rectangle

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rectangle}
      POSTGRES_USER: ${POSTGRES_USER:-rectangle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your environment file}
    volumes:
      - rectangle_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - rectangle_internal

  migrate:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-rectangle}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rectangle}
      SESSION_JWT_SECRET: ${SESSION_JWT_SECRET:?Set SESSION_JWT_SECRET in your environment file}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    command: ["npm", "run", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rectangle_internal

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-rectangle}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rectangle}
      SESSION_JWT_SECRET: ${SESSION_JWT_SECRET:?Set SESSION_JWT_SECRET in your environment file}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8080/health/ready', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rectangle_internal
      - rectangle_public

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rectangle_public

volumes:
  rectangle_postgres_data:

networks:
  rectangle_internal:
    internal: true
  rectangle_public:
