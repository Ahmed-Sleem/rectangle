# Use ONLY if Railway Root Directory is the monorepo root (not apps/web).
# Preferred setup: Root Directory = apps/web and apps/web/railway.toml
# Docs: docs/DEPLOY_RAILWAY.md

[build]
buildCommand = "npm ci --prefix apps/web --include=dev && npm run build --prefix apps/web"

[deploy]
startCommand = "npm run start --prefix apps/web"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
