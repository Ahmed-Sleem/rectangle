# Rectangle single-service Railway deployment
# Root Directory: repository root
# This container builds the web app and API separately, then the API serves the built web app.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "npm --prefix apps/api run migrate && npm --prefix apps/api run start"
healthcheckPath = "/health/live"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
